<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Veliom - Advanced Demo</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      color: #eaeaea;
      min-height: 100vh;
      padding: 2rem;
    }

    .app {
      max-width: 600px;
      margin: 0 auto;
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(20px);
      padding: 2rem;
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    header {
      text-align: center;
      margin-bottom: 2rem;
    }

    header h1 {
      font-size: 2.2rem;
      background: linear-gradient(135deg, #00d9ff, #00ff88);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .version {
      font-size: 0.8rem;
      color: #666;
      margin-top: 0.5rem;
    }

    section {
      margin: 1.5rem 0;
      padding: 1.5rem;
      background: rgba(255, 255, 255, 0.02);
      border-radius: 12px;
    }

    h2 {
      color: #00d9ff;
      font-size: 1.1rem;
      margin-bottom: 1rem;
    }

    h3 {
      color: #888;
      font-size: 1rem;
      margin-bottom: 0.5rem;
    }

    .counter-section {
      text-align: center;
      background: linear-gradient(135deg, rgba(0, 217, 255, 0.1), rgba(0, 255, 136, 0.1));
    }

    .counter {
      font-size: 5rem;
      font-weight: bold;
      background: linear-gradient(135deg, #00d9ff, #00ff88);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: 0 0 40px rgba(0, 217, 255, 0.3);
    }

    .buttons {
      display: flex;
      gap: 1rem;
      justify-content: center;
      margin-top: 1rem;
    }

    button {
      background: linear-gradient(135deg, #0f3460, #16213e);
      color: #eaeaea;
      border: 1px solid rgba(0, 217, 255, 0.3);
      padding: 0.75rem 1.5rem;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s;
    }

    button:hover {
      background: linear-gradient(135deg, #1a4a7a, #0f3460);
      border-color: #00d9ff;
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(0, 217, 255, 0.3);
    }

    button:active {
      transform: scale(0.98);
    }

    button.primary {
      background: linear-gradient(135deg, #00d9ff, #0099cc);
      border-color: #00d9ff;
      font-weight: bold;
    }

    button.error-btn {
      background: linear-gradient(135deg, #ff4444, #cc0000);
      border-color: #ff4444;
    }

    button.delete-btn {
      background: rgba(255, 68, 68, 0.2);
      padding: 0.3rem 0.6rem;
      font-size: 0.8rem;
    }

    button.delete-btn:hover {
      background: rgba(255, 68, 68, 0.4);
    }

    .input-row {
      display: flex;
      gap: 0.5rem;
    }

    input {
      flex: 1;
      padding: 0.75rem 1rem;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.3);
      color: #eaeaea;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.3s;
    }

    input:focus {
      border-color: #00d9ff;
      box-shadow: 0 0 10px rgba(0, 217, 255, 0.2);
    }

    .list-item {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.75rem 1rem;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 8px;
      margin: 0.5rem 0;
      transition: all 0.2s;
    }

    .list-item:hover {
      background: rgba(255, 255, 255, 0.08);
      transform: translateX(5px);
    }

    .list-item .index {
      width: 24px;
      height: 24px;
      background: rgba(0, 217, 255, 0.2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      color: #00d9ff;
    }

    .list-item .text {
      flex: 1;
    }

    .error-demo {
      background: rgba(255, 68, 68, 0.05);
      border: 1px solid rgba(255, 68, 68, 0.2);
    }

    .error-message {
      color: #ff4444;
      padding: 1rem;
      background: rgba(255, 68, 68, 0.1);
      border-radius: 8px;
    }

    .error-message p {
      margin: 0.5rem 0;
    }

    .store-section {
      background: linear-gradient(135deg, rgba(0, 255, 136, 0.05), rgba(0, 217, 255, 0.05));
    }

    .store-section p {
      margin: 0.5rem 0;
      color: #a0a0a0;
    }

    .badge {
      display: inline-block;
      background: #ff4444;
      color: white;
      padding: 0.25rem 0.75rem;
      border-radius: 20px;
      font-size: 0.8rem;
      margin-left: 0.5rem;
      animation: pulse 1s infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }

    .actions {
      display: flex;
      gap: 1rem;
      justify-content: center;
    }

    hr {
      border: none;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      margin: 2rem 0 1rem;
    }

    footer {
      text-align: center;
      color: #666;
      font-size: 0.9rem;
    }

    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .modal-content {
      background: #16213e;
      border-radius: 16px;
      padding: 2rem;
      max-width: 400px;
      width: 90%;
      animation: slideUp 0.3s ease;
      border: 1px solid rgba(0, 217, 255, 0.3);
    }

    @keyframes slideUp {
      from { transform: translateY(50px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .modal-header h2 {
      margin: 0;
      font-size: 1.3rem;
    }

    .close-btn {
      background: transparent;
      border: none;
      color: #888;
      font-size: 1.5rem;
      cursor: pointer;
      padding: 0.25rem 0.5rem;
    }

    .close-btn:hover {
      color: #ff4444;
      background: transparent;
      transform: none;
    }

    .modal-body p {
      color: #a0a0a0;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="./advanced-demo.ts"></script>
</body>
</html>
