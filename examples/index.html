<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Veliom - Ultra Fast Framework</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #eaeaea;
      min-height: 100vh;
      padding: 2rem;
    }

    .app {
      max-width: 500px;
      margin: 0 auto;
      background: rgba(255, 255, 255, 0.05);
      padding: 2rem;
      border-radius: 16px;
      backdrop-filter: blur(10px);
    }

    h1 {
      color: #00d9ff;
      font-size: 1.8rem;
      margin-bottom: 0.5rem;
    }

    h2 {
      color: #a0a0a0;
      font-size: 1.2rem;
      margin: 1rem 0 0.5rem;
    }

    p {
      color: #888;
      margin-bottom: 1rem;
    }

    .counter-section {
      background: rgba(0, 217, 255, 0.1);
      padding: 1.5rem;
      border-radius: 12px;
      margin: 1rem 0;
    }

    .counter {
      font-size: 4rem;
      color: #00d9ff;
      text-align: center;
      font-weight: bold;
      text-shadow: 0 0 20px rgba(0, 217, 255, 0.5);
    }

    .buttons {
      display: flex;
      gap: 1rem;
      justify-content: center;
      margin-top: 1rem;
    }

    button {
      background: linear-gradient(135deg, #0f3460 0%, #16213e 100%);
      color: #eaeaea;
      border: 1px solid rgba(0, 217, 255, 0.3);
      padding: 0.75rem 1.5rem;
      border-radius: 8px;
      font-size: 1.1rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    button:hover {
      background: linear-gradient(135deg, #1a4a7a 0%, #0f3460 100%);
      border-color: #00d9ff;
      transform: translateY(-2px);
    }

    button:active {
      transform: scale(0.98);
    }

    .toggle-btn {
      width: 100%;
      margin-top: 0.5rem;
      background: transparent;
    }

    .input-section {
      margin: 1.5rem 0;
      padding: 1rem;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 8px;
    }

    input {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.3);
      color: #eaeaea;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus {
      border-color: #00d9ff;
    }

    .input-display {
      margin-top: 0.5rem;
      color: #00d9ff !important;
    }

    .list-section {
      margin-top: 1rem;
    }

    .list-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.75rem 1rem;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 6px;
      margin: 0.5rem 0;
      transition: background 0.2s;
    }

    .list-item:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    .delete-btn {
      padding: 0.25rem 0.75rem;
      font-size: 0.9rem;
      background: rgba(255, 0, 0, 0.2);
      border-color: rgba(255, 0, 0, 0.3);
    }

    .delete-btn:hover {
      background: rgba(255, 0, 0, 0.4);
      border-color: #ff4444;
    }

    hr {
      border: none;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      margin: 1.5rem 0 1rem;
    }

    footer {
      text-align: center;
      color: #666;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="./demo.ts"></script>
</body>
</html>
